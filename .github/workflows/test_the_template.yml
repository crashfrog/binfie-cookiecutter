name: Test Cookiecutter Template

on: [push, pull_request]

jobs:
  test-template:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install Cookiecutter
      run: pip install cookiecutter

    - name: Generate a fake project from the template
      run: cookiecutter . --no-input -o ~/ full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project" open_source_license="Public domain"

    - name: Run tests
      run: cd ~/test_project && make test

    - name: Build the Docker image
      run: cd ~/test_project && docker build . --file Dockerfile --tag testproject:$(date +%s)

    - name: Test licenses
      run: |
        cookiecutter . --no-input -o /dev/null  open_source_license="MIT License" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="BSD License" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="ISC License" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="US Government Work Product" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="Apache Software License 2.0" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="GNU General Public License v3" full_name="John Doe" email="jondoe@email.email" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  open_source_license="Not open source" full_name="John Doe" email="jon doe" email="jondoe.jon.doe" github_username="johndoe" project_name="Test Project"

    - name: Test workflow languages
      run: |
        cookiecutter . --no-input -o /dev/null  workflow_language="Nextflow" full_name="John Doe" email="jondoe@jon.doe" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  workflow_language="Snakemake" full_name="John Doe" email="jondoe@jon.doe" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  workflow_language="WDL" full_name="John Doe" email="jondoe@jon.doe" github_username="johndoe" project_name="Test Project"
        cookiecutter . --no-input -o /dev/null  workflow_language="CWL" full_name="John Doe" email="jondoe@jon.doe" github_username="johndoe" project_name="Test Project"