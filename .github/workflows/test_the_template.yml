name: Test Cookiecutter Template

on: [push, pull_request]

jobs:
  pytest-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install jinja2 jinja2-time cookiecutter pytest pytest-cookies

    - name: Lint Jinja2 templates
      run: |
        python - <<'EOF'
        import sys
        from pathlib import Path
        from jinja2 import Environment, TemplateSyntaxError

        env = Environment(extensions=["jinja2_time.TimeExtension"])
        errors = []
        for path in Path("{{cookiecutter.__project_slug}}").rglob("*"):
            if path.is_file():
                try:
                    env.parse(path.read_text(errors="ignore"))
                except TemplateSyntaxError as e:
                    errors.append(f"{path}: {e}")
        if errors:
            print("\n".join(errors))
            sys.exit(1)
        print(f"OK: {sum(1 for p in Path('{{cookiecutter.__project_slug}}').rglob('*') if p.is_file())} template files parsed")
        EOF

    - name: Run pytest-cookies tests
      run: pytest tests/ -v

  integration:
    runs-on: ubuntu-latest
    needs: pytest-tests

    strategy:
      matrix:
        include:
          - variant: cli-on
            extra_args: ""
          - variant: cli-off
            extra_args: 'project_shell_cmd=""'

    env:
      FAKE_PROJECT: My Cool Project
      FAKE_DIR: my_cool_project
      FAKE_PKG: mycoolproject

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Cookiecutter
      run: pip install cookiecutter build

    - name: Generate project (${{ matrix.variant }})
      run: |
        cookiecutter . --no-input -o ~/ \
          full_name="John Doe" \
          email="jondoe@example.com" \
          github_username="johndoe" \
          project_name="$FAKE_PROJECT" \
          open_source_license="Public domain" \
          __name_check=false \
          ${{ matrix.extra_args }}

    - name: Run tests
      run: cd ~/$FAKE_DIR && make test

    - name: Build distribution
      run: cd ~/$FAKE_DIR && make dist

    - name: Build Docker image
      run: cd ~/$FAKE_DIR && docker build . --file Dockerfile --tag $FAKE_PKG:${{ matrix.variant }}
